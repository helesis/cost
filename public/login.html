<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cost Analysis — Giriş</title>
<link rel="stylesheet" href="/voyage-design-system.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  [data-lucide], .lucide { stroke-width: 2; flex-shrink: 0; }
  .btn [data-lucide], .btn .lucide { width: 14px; height: 14px; vertical-align: -3px; margin-right: 6px; }
</style>
</head>
<body class="no-sidebar">

<div id="main" style="align-items:center;justify-content:center;padding:20px">

  <div style="width:100%;max-width:420px">

    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px">
      <div class="brand-mark" style="width:52px;height:52px;font-size:20px">V</div>
      <div class="brand-name" style="font-size:18px">COST <span>ANALYSIS</span></div>
      <div class="brand-sub">F&amp;B Maliyet Analizi</div>
    </div>

    <div class="card">

      <div id="step-email">
        <div class="card-title" style="display:block;margin-bottom:6px">Giriş Yap</div>
        <div id="step-email-sub" style="font-size:13px;color:var(--text-dim);margin-bottom:20px">
          E-posta adresinize tek kullanımlık bir kod göndereceğiz.
        </div>

        <div id="msg-email" class="badge" style="display:none;width:100%;justify-content:center;padding:10px 12px;margin-bottom:14px"></div>

        <form id="form-email">
          <div class="form-group mb-16">
            <label class="form-label" for="email">E-POSTA ADRESİ</label>
            <input type="email" id="email" class="form-input" placeholder="ornek@example.com" autocomplete="email" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="btn-send" style="width:100%;justify-content:center">
            Kod Gönder
          </button>
        </form>
      </div>

      <div id="step-otp" style="display:none">
        <div class="card-title" style="display:block;margin-bottom:6px">Doğrulama Kodu</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:10px">
          Gönderdiğimiz 6 haneli kodu girin.
        </div>
        <div class="badge badge-gold" id="email-display" style="margin-bottom:20px"></div>

        <div id="msg-otp" class="badge" style="display:none;width:100%;justify-content:center;padding:10px 12px;margin-bottom:14px"></div>

        <div class="badge badge-gray" id="dev-otp-hint" style="display:none;margin-bottom:16px;font-size:12px;line-height:1.45;text-align:center">
          E-posta gönderilmedi. Bu ortamda sabit kod: <strong id="dev-otp-code">000000</strong>
        </div>

        <form id="form-otp">
          <div class="form-group mb-16">
            <label class="form-label" for="kod">6 HANELİ KOD</label>
            <input type="text" id="kod" class="form-input" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="••••••" autocomplete="one-time-code" required style="text-align:center;font-size:22px;letter-spacing:10px;padding:14px">
          </div>
          <button type="submit" class="btn btn-primary btn-lg" id="btn-verify" style="width:100%;justify-content:center">
            Giriş Yap
          </button>
          <button type="button" class="btn btn-ghost" id="btn-back" style="width:100%;justify-content:center;margin-top:10px">
            <i data-lucide="arrow-left"></i>Farklı e-posta kullan
          </button>
        </form>
      </div>

    </div>

    <div style="text-align:center;font-size:11px;color:var(--text-xdim);margin-top:20px;letter-spacing:0.05em">
      © İç Sistem
    </div>

  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  if (localStorage.getItem('vc_token')) {
    window.location.href = '/';
  }

  function vcLucide() { try { window.lucide && lucide.createIcons(); } catch (e) {} }
  vcLucide();

  const stepEmail = $('step-email');
  const stepOtp   = $('step-otp');
  let currentEmail = '';

  function showMsg(el, text, type) {
    el.textContent = text;
    el.className = 'badge ' + (type === 'error' ? 'badge-red' : type === 'success' ? 'badge-green' : 'badge-gray');
    el.style.display = 'flex';
  }
  function hideMsg(el) { el.style.display = 'none'; }

  function setLoading(btn, loading, defaultText) {
    if (loading) {
      btn.disabled = true;
      btn.style.opacity = '0.7';
      btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;border-top-color:#fff"></span> Gönderiliyor...';
    } else {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.textContent = defaultText;
    }
  }

  let emailOnlyLogin = false;
  let btnSendDefaultText = 'Kod Gönder';

  async function initLoginMode() {
    try {
      const r = await fetch('/api/auth/login-mode');
      const data = await r.json();
      emailOnlyLogin = !!data.emailOnlyLogin;
      const sub = $('step-email-sub');
      const btn = $('btn-send');
      if (emailOnlyLogin) {
        if (sub) sub.textContent = 'Yetkili e-posta adresinizle doğrudan giriş yapın.';
        btnSendDefaultText = 'Giriş Yap';
        btn.textContent = btnSendDefaultText;
      }
    } catch (e) {
      /* ağ yoksa OTP akışı */
    }
  }

  $('btn-send').disabled = true;
  initLoginMode().finally(() => { $('btn-send').disabled = false; });

  $('form-email').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = $('email').value.trim();
    const msg = $('msg-email');
    const btn = $('btn-send');
    hideMsg(msg);
    if (emailOnlyLogin) {
      btn.disabled = true;
      btn.style.opacity = '0.7';
      btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;border-top-color:#fff"></span> Giriş yapılıyor...';
      try {
        const r = await fetch('/api/auth/quick-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Giriş yapılamadı');
        localStorage.setItem('vc_token', data.token);
        localStorage.setItem('vc_email', data.email);
        showMsg(msg, 'Yönlendiriliyorsunuz...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 400);
      } catch (err) {
        showMsg(msg, err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = btnSendDefaultText;
      }
      return;
    }

    setLoading(btn, true);

    try {
      const r = await fetch('/api/auth/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Bir hata oluştu');

      currentEmail = email;
      $('email-display').textContent = email;
      const devHint = $('dev-otp-hint');
      const devCodeEl = $('dev-otp-code');
      if (data.resendYok && data.devOtpHint) {
        devCodeEl.textContent = data.devOtpHint;
        devHint.style.display = 'flex';
        $('kod').value = data.devOtpHint;
      } else {
        devHint.style.display = 'none';
        $('kod').value = '';
      }
      stepEmail.style.display = 'none';
      stepOtp.style.display = 'block';
      setTimeout(() => $('kod').focus(), 100);
    } catch (err) {
      showMsg(msg, err.message, 'error');
    } finally {
      setLoading(btn, false, btnSendDefaultText);
    }
  });

  $('form-otp').addEventListener('submit', async (e) => {
    e.preventDefault();
    const kod = $('kod').value.trim();
    const msg = $('msg-otp');
    const btn = $('btn-verify');
    hideMsg(msg);

    if (!/^\d{6}$/.test(kod)) {
      showMsg(msg, 'Kod 6 haneli olmalı', 'error');
      return;
    }

    btn.disabled = true;
    btn.style.opacity = '0.7';
    btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;border-top-color:#fff"></span> Doğrulanıyor...';

    try {
      const r = await fetch('/api/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: currentEmail, kod })
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Kod doğrulanamadı');

      localStorage.setItem('vc_token', data.token);
      localStorage.setItem('vc_email', data.email);
      showMsg(msg, 'Giriş başarılı, yönlendiriliyorsunuz...', 'success');
      setTimeout(() => { window.location.href = '/'; }, 600);
    } catch (err) {
      showMsg(msg, err.message, 'error');
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.textContent = 'Giriş Yap';
    }
  });

  $('btn-back').addEventListener('click', () => {
    stepOtp.style.display = 'none';
    stepEmail.style.display = 'block';
    $('kod').value = '';
    $('dev-otp-hint').style.display = 'none';
    hideMsg($('msg-otp'));
    $('email').focus();
  });

  $('kod').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '');
  });
</script>

</body>
</html>
